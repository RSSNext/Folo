appId: is.follow
---
- waitForAnimationToEnd:
    timeout: 15000
- runFlow:
    file: dismiss-ios-system-modal.yaml
- runFlow:
    when:
      visible:
        id: no-login-timeline
    commands:
      - tapOn:
          id: no-login-timeline
- extendedWaitUntil:
    visible:
      id: login-screen
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: login-provider-credential
    timeout: 60000
- extendedWaitUntil:
    visible:
      id: login-provider-google
    timeout: 60000
- extendedWaitUntil:
    visible:
      id: login-provider-github
    timeout: 60000
