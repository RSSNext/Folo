appId: is.follow
---
- waitForAnimationToEnd:
    timeout: 15000
- runFlow:
    when:
      visible:
        id: onboarding-next
    commands:
      - tapOn:
          id: onboarding-next
      - tapOn:
          id: onboarding-next
      - tapOn:
          id: onboarding-next
      - tapOn:
          id: onboarding-next
- runFlow:
    when:
      notVisible:
        text: Continue with Email
    commands:
      - runFlow:
          when:
            visible:
              id: no-login-timeline
          commands:
            - tapOn:
                id: no-login-timeline
      - runFlow:
          when:
            notVisible:
              id: no-login-timeline
          commands:
            - runFlow:
                when:
                  visible:
                    id: home-avatar-trigger
                commands:
                  - tapOn:
                      id: home-avatar-trigger
            - runFlow:
                when:
                  notVisible:
                    id: home-avatar-trigger
                commands:
                  - runFlow:
                      when:
                        visible:
                          id: tab-SettingsTabScreen
                      commands:
                        - tapOn:
                            id: tab-SettingsTabScreen
                  - runFlow:
                      when:
                        notVisible:
                          id: tab-SettingsTabScreen
                      commands:
                        - tapOn:
                            text: Settings
                  - runFlow:
                      when:
                        visible:
                          id: settings-sign-in
                      commands:
                        - tapOn:
                            id: settings-sign-in
      - extendedWaitUntil:
          visible:
            text: Continue with Email
          timeout: 15000
- assertVisible:
    text: Continue with Email
