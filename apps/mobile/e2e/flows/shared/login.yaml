appId: is.follow
---
- assertVisible:
    id: login-screen
- tapOn:
    id: auth-toggle-mode
- extendedWaitUntil:
    visible: Don't have an account? Sign up
    timeout: 10000
- tapOn:
    id: login-provider-credential
- extendedWaitUntil:
    visible:
      id: login-email-input
    timeout: 15000
- tapOn:
    id: login-email-input
- inputText: ${E2E_EMAIL}
- tapOn:
    id: login-password-input
- eraseText
- inputText: ${E2E_PASSWORD}
- pressKey: Enter
- extendedWaitUntil:
    notVisible:
      id: login-screen
    timeout: 30000
- assertNotVisible:
    id: login-screen
