appId: is.follow
---
- runFlow: open-auth.yaml
- tapOn:
    id: auth-toggle-mode
- extendedWaitUntil:
    visible: Don't have an account? Sign up
    timeout: 10000
- tapOn:
    text: Continue with Email
- extendedWaitUntil:
    visible:
      id: login-email-input
    timeout: 15000
- tapOn:
    id: login-email-input
- inputText: ${E2E_EMAIL}
- tapOn:
    id: login-password-input
- eraseText
- setClipboard: ${E2E_PASSWORD}
- pasteText
- tapOn:
    id: login-submit
- extendedWaitUntil:
    notVisible:
      id: login-screen
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: tab-IndexTabScreen
    timeout: 30000
- tapOn:
    id: tab-IndexTabScreen
- extendedWaitUntil:
    visible:
      id: timeline-view-articles
    timeout: 30000
