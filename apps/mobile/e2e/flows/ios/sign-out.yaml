appId: is.follow
---
- waitForAnimationToEnd:
    timeout: 15000
- runFlow:
    file: ./dismiss-overlays.yaml
- runFlow:
    when:
      visible:
        id: navigation-back
    commands:
      - tapOn:
          id: navigation-back
      - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: navigation-back
    commands:
      - tapOn:
          id: navigation-back
      - waitForAnimationToEnd
- runFlow:
    commands:
      - tapOn:
          point: "89%,95%"
      - waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: settings-general-link
    timeout: 15000
- scrollUntilVisible:
    element:
      id: settings-sign-out
    direction: DOWN
    timeout: 15000
    centerElement: false
- tapOn:
    id: settings-sign-out
- extendedWaitUntil:
    visible: Confirm sign out
    timeout: 10000
- tapOn:
    text: Sign Out
- extendedWaitUntil:
    visible:
      id: login-provider-credential
    timeout: 30000
- assertVisible:
    id: login-provider-credential
