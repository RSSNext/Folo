appId: is.follow
---
- runFlow:
    file: ./dismiss-system-dialogs.yaml
- extendedWaitUntil:
    visible:
      id: login-provider-credential
    timeout: 60000
- tapOn:
    id: auth-toggle-mode
- extendedWaitUntil:
    visible: Don't have an account? Sign up
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: login-provider-credential
    timeout: 15000
- tapOn:
    id: login-provider-credential
- extendedWaitUntil:
    visible:
      id: login-email-input
    timeout: 15000
- tapOn:
    id: login-email-input
- eraseText
- setClipboard: ${E2E_EMAIL}
- pasteText
- tapOn:
    id: login-password-input
- eraseText
- setClipboard: ${E2E_PASSWORD}
- pasteText
- tapOn:
    id: login-submit
- extendedWaitUntil:
    notVisible:
      id: login-provider-credential
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: timeline-entry-first
    timeout: 30000
