name: "📄 Deploy to GitHub Pages"

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "API URL for the Follow backend"
        required: false
        default: "https://api.folo.is"
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build static web app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - uses: pnpm/action-setup@v4

      - name: Use Node.js LTS
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build web app
        working-directory: apps/desktop
        env:
          VITE_API_URL: ${{ inputs.api_url }}
          VITE_WEB_URL: ${{ github.event.repository.homepage || 'https://app.folo.is' }}
        run: pnpm run build:web

      - name: Create SPA routing fallback
        run: cp apps/desktop/out/web/index.html apps/desktop/out/web/404.html

      - name: Create .nojekyll file
        run: touch apps/desktop/out/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/desktop/out/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
