name: 🏷️ Release Orchestrator

on:
  push:
    branches:
      - main
      - mobile-main

permissions:
  contents: write
  actions: write

jobs:
  create_tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    outputs:
      tag_version: ${{ steps.release_info.outputs.tag_version }}
      platform: ${{ steps.release_info.outputs.platform }}
      version: ${{ steps.release_info.outputs.version }}
      ref_name: ${{ steps.release_info.outputs.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Make script executable
        run: |
          chmod +x .github/scripts/extract-release-info.mjs

      - name: Extract release information
        id: extract_info
        run: .github/scripts/extract-release-info.mjs
        continue-on-error: true

      - name: Expose release outputs
        id: release_info
        run: |
          echo "tag_version=${tag_version:-}" >> "$GITHUB_OUTPUT"
          echo "platform=${platform:-}" >> "$GITHUB_OUTPUT"
          echo "version=${version:-}" >> "$GITHUB_OUTPUT"
          echo "ref_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Validate git configuration
        if: steps.release_info.outputs.tag_version != ''
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        if: steps.release_info.outputs.tag_version != ''
        run: |
          git fetch --tags --force
          echo "Creating tag: ${{ steps.release_info.outputs.tag_version }}"
          if git rev-parse "${{ steps.release_info.outputs.tag_version }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.release_info.outputs.tag_version }} already exists, skipping creation"
            exit 0
          fi

          git tag "${{ steps.release_info.outputs.tag_version }}"
          git push origin "${{ steps.release_info.outputs.tag_version }}"
          echo "Successfully created and pushed tag: ${{ steps.release_info.outputs.tag_version }}"

  trigger_builds:
    name: Trigger Platform Builds
    needs: create_tag
    if: needs.create_tag.outputs.tag_version != ''
    runs-on: ubuntu-latest

    steps:
      - name: Extract OTA release trailers
        id: ota_release
        if: needs.create_tag.outputs.platform == 'mobile' && needs.create_tag.outputs.ref_name == 'mobile-main'
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          RELEASE_VERSION: ${{ needs.create_tag.outputs.version }}
        run: |
          ota_trailers="$(printf '%s\n' "$COMMIT_MESSAGE" | sed -nE '/^OTA_/p')"
          normalized_release_version="${RELEASE_VERSION#v}"

          if [ -z "$ota_trailers" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "release_kind=" >> "$GITHUB_OUTPUT"
            echo "runtime_version=" >> "$GITHUB_OUTPUT"
            echo "channel=" >> "$GITHUB_OUTPUT"
            echo "release_version=${normalized_release_version}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          invalid_trailers="$(printf '%s\n' "$ota_trailers" | sed -nE '/^OTA_(RELEASE_KIND|RUNTIME_VERSION|CHANNEL)=/!p')"
          if [ -n "$invalid_trailers" ]; then
            echo "::error::Unsupported OTA trailer lines detected:"
            printf '%s\n' "$invalid_trailers"
            exit 1
          fi

          release_kind_values="$(printf '%s\n' "$COMMIT_MESSAGE" | sed -nE 's/^OTA_RELEASE_KIND=(.*)$/\1/p')"
          runtime_version_values="$(printf '%s\n' "$COMMIT_MESSAGE" | sed -nE 's/^OTA_RUNTIME_VERSION=(.*)$/\1/p')"
          channel_values="$(printf '%s\n' "$COMMIT_MESSAGE" | sed -nE 's/^OTA_CHANNEL=(.*)$/\1/p')"

          count_values() {
            local values="$1"

            if [ -z "$values" ]; then
              echo 0
              return
            fi

            printf '%s\n' "$values" | sed '/^$/d' | wc -l | tr -d ' '
          }

          release_kind_count="$(count_values "$release_kind_values")"
          runtime_version_count="$(count_values "$runtime_version_values")"
          channel_count="$(count_values "$channel_values")"

          if [ "$release_kind_count" -ne 1 ] || [ "$runtime_version_count" -ne 1 ] || [ "$channel_count" -ne 1 ]; then
            echo "::error::OTA trailers are incomplete or duplicated. Expected exactly one OTA_RELEASE_KIND, OTA_RUNTIME_VERSION, and OTA_CHANNEL trailer when any OTA_ trailer is present."
            printf '%s\n' "$ota_trailers"
            exit 1
          fi

          release_kind="$(printf '%s\n' "$release_kind_values" | tail -n 1)"
          runtime_version="$(printf '%s\n' "$runtime_version_values" | tail -n 1)"
          channel="$(printf '%s\n' "$channel_values" | tail -n 1)"

          case "$release_kind" in
            ota|store) ;;
            *)
              echo "::error::OTA_RELEASE_KIND must be either ota or store."
              exit 1
              ;;
          esac

          if [ -z "$runtime_version" ]; then
            echo "::error::OTA_RUNTIME_VERSION must not be empty."
            exit 1
          fi

          case "$channel" in
            production|preview) ;;
            *)
              echo "::error::OTA_CHANNEL must be either production or preview."
              exit 1
              ;;
          esac

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "release_kind=${release_kind}" >> "$GITHUB_OUTPUT"
          echo "runtime_version=${runtime_version}" >> "$GITHUB_OUTPUT"
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
          echo "release_version=${normalized_release_version}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        if: needs.create_tag.outputs.platform == 'desktop' && needs.create_tag.outputs.ref_name == 'main'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        if: needs.create_tag.outputs.platform == 'desktop' && needs.create_tag.outputs.ref_name == 'main'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve desktop build version
        id: desktop_build_version
        if: needs.create_tag.outputs.platform == 'desktop' && needs.create_tag.outputs.ref_name == 'main'
        run: |
          git fetch --tags --force
          latest_tag="$(git tag -l 'desktop-build/v*' --sort=-v:refname | head -n 1)"
          if [ -z "$latest_tag" ]; then
            last_build=110
          else
            last_build="${latest_tag#desktop-build/v}"
          fi

          next_build=$((last_build + 1))
          build_tag="desktop-build/v${next_build}"

          if git rev-parse "$build_tag" >/dev/null 2>&1; then
            echo "Build tag $build_tag already exists."
            exit 1
          fi

          git tag "$build_tag"
          git push origin "$build_tag"
          echo "build_version=${next_build}" >> "$GITHUB_OUTPUT"
          echo "Desktop build version: ${next_build}"

      - name: Trigger Desktop Tag Version Build
        if: needs.create_tag.outputs.platform == 'desktop' && needs.create_tag.outputs.ref_name == 'main'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const response = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-desktop.yml',
              ref: 'main',
              inputs: {
                tag_version: 'true',
                store: 'false'
              }
            });
            console.log('Desktop Tag Version build triggered successfully');

      - name: Trigger Desktop Store Build
        if: needs.create_tag.outputs.platform == 'desktop' && needs.create_tag.outputs.ref_name == 'main'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const response = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-desktop.yml',
              ref: 'main',
              inputs: {
                tag_version: 'false',
                store: 'true',
                build_version: '${{ steps.desktop_build_version.outputs.build_version }}'
              }
            });
            console.log('Desktop store build triggered successfully');

      - name: Trigger Mobile Preview Release Build
        if: needs.create_tag.outputs.platform == 'mobile' && needs.create_tag.outputs.ref_name == 'mobile-main'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const response = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-android.yml',
              ref: 'mobile-main',
              inputs: {
                profile: 'preview',
                release: 'true'
              }
            });
            console.log('Mobile preview release build triggered successfully');

      - name: Trigger Mobile Production Android Build
        if: needs.create_tag.outputs.platform == 'mobile' && needs.create_tag.outputs.ref_name == 'mobile-main'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const response = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-android.yml',
              ref: 'mobile-main',
              inputs: {
                profile: 'production',
                release: 'false'
              }
            });
            console.log('Mobile production Android build triggered successfully');

      - name: Trigger Mobile Production iOS Build
        if: needs.create_tag.outputs.platform == 'mobile' && needs.create_tag.outputs.ref_name == 'mobile-main'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const response = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-ios.yml',
              ref: 'mobile-main',
              inputs: {
                profile: 'production'
              }
            });
            console.log('Mobile production iOS build triggered successfully');

      - name: Trigger Mobile OTA Publish
        if: needs.create_tag.outputs.platform == 'mobile' && needs.create_tag.outputs.ref_name == 'mobile-main' && steps.ota_release.outputs.enabled == 'true'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish-ota.yml',
              ref: '${{ needs.create_tag.outputs.tag_version }}',
              inputs: {
                release_version: '${{ steps.ota_release.outputs.release_version }}',
                release_kind: '${{ steps.ota_release.outputs.release_kind }}',
                runtime_version: '${{ steps.ota_release.outputs.runtime_version }}',
                channel: '${{ steps.ota_release.outputs.channel }}'
              }
            });
            console.log('Mobile OTA publish workflow triggered successfully');
